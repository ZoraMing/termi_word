name: Auto Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            asset_name: termi_word_amdx64.zip
            run_cmd: powershell ./scripts/build.ps1
            built_file: output/termi_word_amdx64.zip

          - os: ubuntu-latest
            asset_name: termi_word_linux.tar.gz
            run_cmd: bash ./scripts/build.sh
            built_file: output/termi_word_linux.tar.gz

          - os: macos-latest
            asset_name: termi_word_mac.tar.gz
            run_cmd: bash ./scripts/build.sh
            built_file: output/termi_word_mac.tar.gz

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install System Dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential patchelf ccache python3-dev


      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt
          pip install nuitka

      - name: Run Build Script
        run: ${{ matrix.run_cmd }}

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.built_file }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release_assets
          merge-multiple: true

      - name: Display downloaded files
        run: ls -lh release_assets/

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: release_assets/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
